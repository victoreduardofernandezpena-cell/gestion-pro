services:
  - type: web
    name: gestion-pro-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: LOGIN_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: LOGIN_RATE_LIMIT_MAX
        value: 10
      - key: DISABLE_LOGIN_RATE_LIMIT
        value: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
